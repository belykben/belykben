name: Update Profile Art

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC (08:30 IST)
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  update-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: belykben
        run: python scripts/scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: python scripts/scripts/render_heatmap_svg.py

      - name: Move outputs to repo root
        run: |
          cp scripts/contrib-heatmap.svg contrib-heatmap.svg
          cp scripts/data/contributions.json data/contributions.json

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contrib-heatmap.svg data/contributions.json scripts/contrib-heatmap.svg scripts/data/contributions.json
          git diff --cached --quiet || git commit -m "chore: refresh contribution graph [skip ci]"
          git push
